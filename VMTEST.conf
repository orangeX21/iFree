[Script]
activation-script-dashboard = type=http-request,pattern=^https://as.as/,requires-body=1,max-size=0,script-path=https://github.com/wibus-wee/activation-script/raw/gh-pages/activator.js,script-update-internal=86400
# activation-script-dashboard：定义一个HTTP请求拦截规则
# type=http-request：规则类型是HTTP请求
# pattern=^https://as.as/：匹配以 https://as.as/ 开头的请求
# requires-body=1：需要请求正文
# max-size=0：不限制请求正文的大小
